<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SPS | Project Tracker</title>
    <style>
        :root{--bg:#0e0e0e;--surface:#161616;--accent:#c8a96e;--text:#e8e8e8;--text-dim:#888888;--border:#2e2e2e;}
        body{font-family:monospace; background:var(--bg); color:var(--text); margin:0; display:grid; grid-template-columns:280px 1fr; height:100vh;}
        .sidebar{background:var(--surface); border-right:1px solid var(--border); padding:20px; overflow-y:auto;}
        .main{padding:40px; overflow-y:auto;}
        .project-card{padding:15px; border:1px solid var(--border); margin-bottom:10px; cursor:pointer; transition:0.2s; border-radius:4px;}
        .project-card:hover{border-color:var(--accent); background:#1a1a1a;}
        .status-badge{font-size:10px; padding:2px 8px; border-radius:2px; background:rgba(200,169,110,0.1); color:var(--accent); text-transform:uppercase;}
        .save-indicator{position:fixed; bottom:20px; right:20px; font-size:11px; color:var(--text-dim);}
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="margin-bottom:20px; color:var(--accent); letter-spacing:2px; font-size:12px;">LAB LOG</div>
        <div id="projectList">Sincronizando...</div>
    </div>
    <div class="main" id="mainContent">
        <h2 style="font-weight:300;">Sound Pressure Studios</h2>
        <p style="color:var(--text-dim);">Pronto para documentar a evolução sonora.</p>
    </div>
    <div id="saveIndicator" class="save-indicator">Ready</div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycby5QUUdRF2CK4tmVvnePaEfrePcJTTUmg9s5GbOgOG7oMydQgPNEKoOprSw8mvQqveiLA/exec;
        let state = { projects: [] };

        async function loadData() {
            try {
                const response = await fetch(API + '?action=getAll');
                state = await response.json();
                renderSidebar();
            } catch (e) {
                document.getElementById('projectList').innerHTML = "Sinal interrompido. Verifica o Deploy.";
            }
        }

        function renderSidebar() {
            let html = '';
            state.projects.forEach(p => {
                html += `<div class="project-card" onclick="openProject('${p.id}')">
                    <div style="font-size:13px; font-weight:bold;">${p.title}</div>
                    <div style="margin-top:5px;"><span class="status-badge">${p.phase}</span></div>
                </div>`;
            });
            document.getElementById('projectList').innerHTML = html || 'Sem projectos no arquivo.';
        }

        function openProject(id) {
            const p = state.projects.find(proj => proj.id === id);
            document.getElementById('mainContent').innerHTML = `
                <h2 style="color:var(--accent);">${p.title}</h2>
                <div style="background:var(--surface); padding:20px; border:1px solid var(--border);">
                    <label style="font-size:11px; color:var(--text-dim);">FASE DO PROCESSO</label>
                    <select onchange="updateProject('${p.id}', 'phase', this.value)" style="background:var(--bg); color:var(--text); border:1px solid var(--border); padding:10px; width:100%; margin-top:10px;">
                        <option value="Recording" ${p.phase=='Recording'?'selected':''}>Captação</option>
                        <option value="Mixing" ${p.phase=='Mixing'?'selected':''}>Mistura</option>
                        <option value="Mastering" ${p.phase=='Mastering'?'selected':''}>Masterização</option>
                        <option value="Completed" ${p.phase=='Completed'?'selected':''}>Concluído</option>
                    </select>
                </div>
            `;
        }

        async function updateProject(id, field, value) {
            const p = state.projects.find(proj => proj.id === id);
            p[field] = value;
            document.getElementById('saveIndicator').innerText = "A gravar no Lab...";
            
            await fetch(API, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'save', sheet: 'Projects', record: p })
            });
            
            setTimeout(() => {
                document.getElementById('saveIndicator').innerText = "Guardado.";
                renderSidebar();
            }, 800);
        }

        window.onload = loadData;
    </script>
</body>
</html>
