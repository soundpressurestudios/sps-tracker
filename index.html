<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SPS Project Tracker</title>
    <style>
        :root{--bg:#0e0e0e;--surface:#161616;--surface2:#1e1e1e;--accent:#c8a96e;--text:#e8e8e8;--text3:#888888;--border:#2e2e2e;--green:#4caf7d;--red:#e05555;}
        body{font-family:monospace;background:var(--bg);color:var(--text);margin:0;overflow:hidden;height:100vh;}
        .header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;height:52px;}
        .app-body{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 52px);}
        .sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;}
        .main{background:var(--bg);overflow-y:auto;padding:20px;}
        .btn{padding:6px 12px;border-radius:4px;cursor:pointer;border:none;font-family:monospace;font-size:11px;}
        .btn-primary{background:var(--accent);color:#0e0e0e;font-weight:600;}
        .save-indicator{font-size:10px;color:var(--text3);}
        .save-indicator.saved{color:var(--green);}
        /* Estilos de inputs e tabelas simplificados para fluidez */
        .field-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;width:100%;box-sizing:border-box;margin-bottom:10px;}
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight:700;">SOUND PRESSURE STUDIOS | <span style="font-weight:400;color:var(--text3);">Lab Manager</span></div>
        <div style="display:flex;gap:15px;align-items:center;">
            <span id="saveIndicator" class="save-indicator">Sincronizado</span>
            <button class="btn btn-primary" onclick="openNewProject()">+ Projeto</button>
        </div>
    </div>
    <div class="app-body">
        <div class="sidebar" id="sidebarList">Carregando arquivo...</div>
        <div class="main" id="mainContent">Seleccione um projecto para começar a trabalhar.</div>
    </div>

    <script>
        // LIGAÇÃO AO LABORATÓRIO
        var artists=[], projects=[], tracks=[], tasks=[];
        var currentProjectId = null;

        function loadData() {
            setSave('A ler ficheiros...', '');
            google.script.run.withSuccessHandler(function(data) {
                artists = data.artists;
                projects = data.projects;
                tracks = data.tracks;
                tasks = data.tasks;
                setSave('Laboratório Pronto', 'saved');
                renderSidebar();
            }).getAllData();
        }

        function renderSidebar() {
            let html = '<div style="padding:10px;text-transform:uppercase;font-size:10px;color:var(--text3);">Projectos Ativos</div>';
            projects.forEach(p => {
                let activeClass = p.id === currentProjectId ? 'style="background:var(--surface2);border-left:2px solid var(--accent);"' : '';
                html += `<div ${activeClass} onclick="selectProject('${p.id}')" style="padding:12px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="font-size:12px;">${p.title}</div>
                    <div style="font-size:10px;color:var(--text3);">${p.phase}</div>
                </div>`;
            });
            document.getElementById('sidebarList').innerHTML = html;
        }

        function selectProject(id) {
            currentProjectId = id;
            let p = projects.find(proj => proj.id === id);
            renderSidebar();
            document.getElementById('mainContent').innerHTML = `
                <h2>${p.title}</h2>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div>
                        <label style="font-size:10px;color:var(--text3);">FASE ATUAL</label>
                        <select class="field-input" onchange="updateField('phase', this.value)">
                            <option value="recording" ${p.phase=='recording'?'selected':''}>Captação</option>
                            <option value="mixing" ${p.phase=='mixing'?'selected':''}>Mistura</option>
                            <option value="mastering" ${p.phase=='mastering'?'selected':''}>Masterização</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="exportProject()">Exportar Créditos</button>
            `;
        }

        function updateField(field, value) {
            let p = projects.find(proj => proj.id === currentProjectId);
            p[field] = value;
            setSave('Gravando...', '');
            google.script.run.withSuccessHandler(() => setSave('Gravado', 'saved')).saveRecord('Projects', p);
        }

        function setSave(txt, cls) {
            let el = document.getElementById('saveIndicator');
            el.innerText = txt;
            el.className = 'save-indicator ' + cls;
        }

        window.onload = loadData;
    </script>
</body>
</html>
