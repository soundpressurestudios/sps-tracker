<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SPS | Project Tracker</title>
    <style>
        :root{--bg:#0e0e0e;--surface:#161616;--accent:#c8a96e;--text:#e8e8e8;--text3:#888888;--border:#2e2e2e;--green:#4caf7d;}
        body{font-family: 'Inter', sans-serif, monospace; background:var(--bg); color:var(--text); margin:0; height:100vh; display:grid; grid-template-columns:280px 1fr;}
        .sidebar{background:var(--surface); border-right:1px solid var(--border); padding:20px; overflow-y:auto;}
        .main{padding:40px; overflow-y:auto;}
        .project-card{padding:15px; border:1px solid var(--border); margin-bottom:10px; cursor:pointer; transition:0.2s;}
        .project-card:hover{border-color:var(--accent);}
        .status-pill{font-size:10px; padding:2px 8px; border-radius:10px; background:var(--border); color:var(--accent); text-transform:uppercase;}
        .save-indicator{position:fixed; bottom:20px; right:20px; font-size:11px; color:var(--text3);}
        h2{font-weight:300; letter-spacing:1px; color:var(--accent);}
    </style>
</head>
<body>
    <div class="sidebar">
        <h3 style="font-size:12px; color:var(--accent);">LAB LOG</h3>
        <div id="sidebarList">Sincronizando...</div>
    </div>
    <div class="main" id="mainContent">
        <h2>Bem-vindo ao Lab, Leopoldo.</h2>
        <p style="color:var(--text3);">Selecciona um projecto para gerir a energia e o progresso das sessões.</p>
    </div>
    <div id="saveIndicator" class="save-indicator">Ready</div>

    <script>
        // COLA AQUI O TEU URL DE "DEPLOY" DO GOOGLE
        const API = 'https://script.google.com/macros/s/AKfycbw2ACqBH1X8wnjiIlp4hWDMRDC9uyWO8rAza5GR7MzK--6QFUvbBVGv0UjJgK5mxH45QA/exec';
        let projects = [];

        async function loadData() {
            try {
                const response = await fetch(API + '?action=getAll');
                const data = await response.json();
                projects = data.projects;
                renderSidebar();
            } catch (e) {
                document.getElementById('sidebarList').innerHTML = "Erro de ligação ao Sheets.";
            }
        }

        function renderSidebar() {
            let html = '';
            projects.forEach(p => {
                html += `<div class="project-card" onclick="selectProject('${p.id}')">
                    <div style="font-size:13px; font-weight:bold;">${p.title}</div>
                    <div style="margin-top:5px;"><span class="status-pill">${p.phase}</span></div>
                </div>`;
            });
            document.getElementById('sidebarList').innerHTML = html;
        }

        function selectProject(id) {
            const p = projects.find(proj => proj.id === id);
            document.getElementById('mainContent').innerHTML = `
                <h2>${p.artistId} // ${p.title}</h2>
                <div style="margin-top:20px; background:var(--surface); padding:20px; border:1px solid var(--border);">
                    <label style="display:block; font-size:11px; color:var(--text3); margin-bottom:10px;">ESTADO DO PROCESSO</label>
                    <select onchange="updateProject('${p.id}', 'phase', this.value)" style="background:var(--bg); color:var(--text); border:1px solid var(--border); padding:10px; width:200px;">
                        <option value="Recording" ${p.phase=='Recording'?'selected':''}>Captação</option>
                        <option value="Mixing" ${p.phase=='Mixing'?'selected':''}>Mistura</option>
                        <option value="Mastering" ${p.phase=='Mastering'?'selected':''}>Masterização</option>
                        <option value="Completed" ${p.phase=='Completed'?'selected':''}>Concluído</option>
                    </select>
                </div>
            `;
        }

        async function updateProject(id, field, value) {
            const p = projects.find(proj => proj.id === id);
            p[field] = value;
            document.getElementById('saveIndicator').innerText = "Gravando no Lab...";
            
            // Envio para o Google Sheets
            await fetch(API, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'save', sheet: 'Projects', record: p })
            });
            
            document.getElementById('saveIndicator').innerText = "Guardado.";
            renderSidebar();
        }

        window.onload = loadData;
    </script>
</body>
</html>
